version: 2

models:
  - name: int_facility_event_planning_snapshot
    description: "施設・月・月内週番号・日付フラグごとの標準目標値とチャレンジ目標値を算出する中間モデル"
    columns:
      - name: benchmark_period_key
        description: "ベンチマーク期間キー"

      - name: benchmark_period_name
        description: "ベンチマーク期間名"

      - name: period_start_date
        description: "期間開始日"

      - name: period_end_date
        description: "期間終了日"

      - name: facility_code
        description: "施設コード"

      - name: facility_name
        description: "施設名"

      - name: po_level
        description: "POレベル"

      - name: regional_office
        description: "支社"

      - name: branch_office
        description: "支店"

      - name: date_flag
        description: "日付フラグ"

      - name: decile_rank
        description: "デシル区分"

      - name: avg_actual
        description: "施設・月・月内週番号・日付フラグ・デシル区分ごとの平均実績"

      - name: p25
        description: "実績下位25%の実績値"

      - name: p50
        description: "デシル区分の中央値"

      - name: p60
        description: "実績上位40%の実績値"

      - name: p70
        description: "実績上位30%の実績値"

      - name: p75
        description: "実績上位25%の実績値"

      - name: p90
        description: "実績上位10%の実績値"

      - name: max_performance
        description: "デシル区分の最大実績値"

      - name: standard_target
        description: "標準目標値"

      - name: challenge_target
        description: "チャレンジ目標値"
