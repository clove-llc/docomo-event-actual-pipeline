version: 2

models:
  - name: int_facility_actuals
    description: "施設別・日付別実績のintermediateモデル"
    columns:
      - name: source_sheet_name
        description: "元データ（スプレッドシート等）のシート名"
        tests:
          - not_null

      - name: regional_office_name
        description: "地方事務所・地域オフィス名"

      - name: branch_office_name
        description: "支店・支部名"

      - name: facility_name
        description: "表記ゆれ対応済みの施設名"
        tests:
          - not_null

      - name: floor_label
        description: "階数・フロア表記"

      - name: space_name
        description: "スペース・部屋名"

      - name: area_raw
        description: "面積・地域の生データ"

      - name: helper_company_name
        description: "ヘルパー会社名"

      - name: staff_count_raw
        description: "スタッフ数の生データ"

      - name: start_date
        description: "開始日"

      - name: end_date
        description: "終了日"

      - name: event_date
        description: "イベント日・発生日"

      - name: actual_value
        description: "実績値（契約数など）"

  - name: int_facility_daily_actual
    description: "施設別・日別実績に施設属性と日付属性を付与したintermediateモデル"
    columns:
      - name: facility_code
        description: "施設コード"

      - name: facility_name
        description: "施設名"

      - name: po_level
        description: "POレベル"

      - name: regional_office
        description: "支社"

      - name: branch_office
        description: "支店"

      - name: date
        description: "実績日"

      - name: year_month
        description: "年月"

      - name: week_number_monthly
        description: "月内週番号"

      - name: week_number_yearly
        description: "年内週番号"

      - name: weekday_name
        description: "曜日"

      - name: weekday_holiday_with_holiday
        description: "平日/休日（祝日加味）"

      - name: date_type
        description: "日付属性"

      - name: date_flag
        description: "日付フラグ"

      - name: actual
        description: "日別実績数"
