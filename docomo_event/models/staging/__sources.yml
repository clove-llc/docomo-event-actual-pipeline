version: 2

sources:
  - name: docomo_event_raw
    database: "{{ target.project }}"
    schema: docomo_event_raw
    description: "docomoイベント分析用のrawデータセット。スプレッドシート/TROCCO/Python等からロードされた元データを保持する。"

    tables:
      - name: raw_facility_master
        description: "施設マスタのrawモデル。スプレッドシート由来の施設情報を保持する。"
        columns:
          - name: facility_code
            description: "施設コード"
            tests:
              - not_null
              - unique

          - name: facility_name
            description: "表示施設名（全体管理簿）"
            tests:
              - not_null

          - name: po_level
            description: "POレベル"

          - name: regional_office
            description: "支社"

          - name: branch_office
            description: "支店"

      - name: raw_facility_daily_deviation_zscore
        description: "施設別・日別の偏差値ベースZスコアrawモデル"
        columns:
          - name: date
            description: "日付"
            tests:
              - not_null

          - name: facility_code
            description: "施設コード"
            tests:
              - not_null

          - name: facility_name
            description: "施設名"
            tests:
              - not_null

          - name: z_score
            description: "偏差値ベースのZスコア"
            tests:
              - not_null

          - name: month
            description: "月番号"
            tests:
              - not_null

          - name: week_number_monthly
            description: "週番号（月）"
            tests:
              - not_null

          - name: date_flag
            description: "日付フラグ"
            tests:
              - not_null

      - name: raw_facility_foot_traffic_avg_and_decile_by_flag
        description: "施設別・日付フラグ別の人流合計およびデシル区分rawモデル"
        columns:
          - name: facility_code
            description: "施設コード"
            tests:
              - not_null
              - unique

          - name: facility_name
            description: "施設名"
            tests:
              - not_null

          - name: gw_foot_traffic_avg
            description: "GW人流平均"
            tests:
              - not_null

          - name: obon_foot_traffic_avg
            description: "お盆人流平均"
            tests:
              - not_null

          - name: three_day_holiday_foot_traffic_avg
            description: "三連休人流平均"
            tests:
              - not_null

          - name: new_year_foot_traffic_avg
            description: "正月人流平均"
            tests:
              - not_null

          - name: regular_weekend_foot_traffic_avg
            description: "通常土日人流平均"
            tests:
              - not_null

          - name: year_end_foot_traffic_avg
            description: "年末人流平均"
            tests:
              - not_null

          - name: bridge_holiday_foot_traffic_avg
            description: "飛び石祝日人流平均"
            tests:
              - not_null

          - name: weekday_foot_traffic_avg
            description: "平日人流平均"
            tests:
              - not_null

          - name: black_friday_foot_traffic_avg
            description: "ブラックフライデー人流平均"
            tests:
              - not_null

          - name: gw_decile_rank
            description: "GWデシル区分"
            tests:
              - not_null

          - name: obon_decile_rank
            description: "お盆デシル区分"
            tests:
              - not_null

          - name: three_day_holiday_decile_rank
            description: "三連休デシル区分"
            tests:
              - not_null

          - name: new_year_decile_rank
            description: "正月デシル区分"
            tests:
              - not_null

          - name: regular_weekend_decile_rank
            description: "通常土日デシル区分"
            tests:
              - not_null

          - name: year_end_decile_rank
            description: "年末デシル区分"
            tests:
              - not_null

          - name: bridge_holiday_decile_rank
            description: "飛び石祝日デシル区分"
            tests:
              - not_null

          - name: weekday_decile_rank
            description: "平日デシル区分"
            tests:
              - not_null

          - name: black_friday_decile_rank
            description: "ブラックフライデーデシル区分"
            tests:
              - not_null

      - name: raw_date_master_2025_2026
        description: "日付マスタのrawモデル"
        columns:
          - name: date
            description: "日付"
            tests:
              - not_null
              - unique

          - name: year_month
            description: "年月"
            tests:
              - not_null

          - name: week_number_yearly
            description: "週番号（月間_1-52（53））"
            tests:
              - not_null

          - name: week_number_monthly
            description: "週番号（月間_1-4（5））"
            tests:
              - not_null

          - name: weekday_name
            description: "曜日"
            tests:
              - not_null

          - name: holiday_name
            description: "祝日名"

          - name: is_holiday
            description: "祝日フラグ"
            tests:
              - not_null

          - name: weekday_holiday_weekend
            description: "平日/休日（土日のみ）"
            tests:
              - not_null

          - name: weekday_holiday_with_holiday
            description: "平日/休日（祝日加味）"
            tests:
              - not_null

          - name: is_offday
            description: "休日フラグ"
            tests:
              - not_null

          - name: date_type
            description: "日付属性"
            tests:
              - not_null

          - name: date_flag
            description: "日付種別"
            tests:
              - not_null

      - name: raw_date_master_2026_2027
        description: "日付マスタのrawモデル"
        columns:
          - name: date
            description: "日付"
            tests:
              - not_null
              - unique

          - name: year_month
            description: "年月"
            tests:
              - not_null

          - name: week_number_yearly
            description: "週番号（月間_1-52（53））"
            tests:
              - not_null

          - name: week_number_monthly
            description: "週番号（月間_1-4（5））"
            tests:
              - not_null

          - name: weekday_name
            description: "曜日"
            tests:
              - not_null

          - name: holiday_name
            description: "祝日名"

          - name: is_holiday
            description: "祝日フラグ"
            tests:
              - not_null

          - name: weekday_holiday_weekend
            description: "平日/休日（土日のみ）"
            tests:
              - not_null

          - name: weekday_holiday_with_holiday
            description: "平日/休日（祝日加味）"
            tests:
              - not_null

          - name: is_offday
            description: "休日フラグ"
            tests:
              - not_null

          - name: date_type
            description: "日付属性"
            tests:
              - not_null

          - name: date_flag
            description: "日付種別"
            tests:
              - not_null

      - name: raw_venue_performance
        description: "会場別・日別実績のrawモデル"
        columns:
          - name: datasource
            description: "データソース"

          - name: "no"
            quote: true
            description: "番号"

          - name: event_month
            description: "イベント月"

          - name: regional_office_name
            description: "支社名"

          - name: branch_name
            description: "支店名"

          - name: facility_name
            description: "施設名"

          - name: floor_label
            description: "階層ラベル"

          - name: floor_number
            description: "階数"

          - name: floor_number_above_ground
            description: "地上階数"

          - name: is_basement_floor
            description: "地下階フラグ"

          - name: floor_category
            description: "階層カテゴリ"

          - name: space_name
            description: "スペース名"

          - name: area_raw
            description: "面積のraw値"

          - name: area_sqm
            description: "面積（㎡）"

          - name: area_group
            description: "面積グループ"

          - name: is_area_unconfirmed
            description: "面積未確認フラグ"

          - name: is_daily_venue
            description: "日別会場フラグ"

          - name: helper_company_name
            description: "ヘルパー会社名"

          - name: staff_count
            description: "スタッフ数"

          - name: staff_count_numeric
            description: "スタッフ数の数値"

          - name: start_date
            description: "開始日"

          - name: end_date
            description: "終了日"

          - name: actual_days_raw
            description: "実施日数のraw値"

          - name: actual_days
            description: "実施日数"

          - name: date
            description: "実績日"

          - name: daily_result_raw
            description: "日別実績数のraw値"

          - name: daily_result
            description: "日別実績数"

          - name: is_missing_input
            description: "入力欠損フラグ"

          - name: is_event_cancelled
            description: "イベント中止フラグ"
