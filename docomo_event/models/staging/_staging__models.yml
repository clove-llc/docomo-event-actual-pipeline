version: 2

models:
  - name: stg_facility_master
    description: "施設マスタのstagingモデル。スプレッドシート由来の施設情報を保持する。"
    columns:
      - name: facility_code
        description: "施設コード"
        tests:
          - not_null
          - unique

      - name: facility_name
        description: "表示施設名（全体管理簿）"
        tests:
          - not_null

      - name: po_level
        description: "POレベル"

      - name: regional_office
        description: "支社"

      - name: branch_office
        description: "支店"

  - name: stg_facility_daily_deviation_zscore
    description: "施設別・日別の偏差値ベースZスコアstagingモデル"
    columns:
      - name: date
        description: "日付"
        tests:
          - not_null

      - name: facility_code
        description: "施設コード"
        tests:
          - not_null

      - name: facility_name
        description: "施設名"
        tests:
          - not_null

      - name: z_score
        description: "偏差値ベースのZスコア"
        tests:
          - not_null

      - name: month
        description: "月番号"
        tests:
          - not_null

      - name: week_number_monthly
        description: "週番号（月）"
        tests:
          - not_null

      - name: date_flag
        description: "日付フラグ"
        tests:
          - not_null

  - name: stg_facility_foot_traffic_avg_and_decile_by_flag
    description: "施設別・日付フラグ別の人流合計およびデシル区分stagingモデル"
    columns:
      - name: facility_code
        description: "施設コード"
        tests:
          - not_null
          - unique

      - name: facility_name
        description: "施設名"
        tests:
          - not_null

      - name: gw_foot_traffic_avg
        description: "GW人流平均"
        tests:
          - not_null

      - name: obon_foot_traffic_avg
        description: "お盆人流平均"
        tests:
          - not_null

      - name: three_day_holiday_foot_traffic_avg
        description: "三連休人流平均"
        tests:
          - not_null

      - name: new_year_foot_traffic_avg
        description: "正月人流平均"
        tests:
          - not_null

      - name: regular_weekend_foot_traffic_avg
        description: "通常土日人流平均"
        tests:
          - not_null

      - name: year_end_foot_traffic_avg
        description: "年末人流平均"
        tests:
          - not_null

      - name: bridge_holiday_foot_traffic_avg
        description: "飛び石祝日人流平均"
        tests:
          - not_null

      - name: weekday_foot_traffic_avg
        description: "平日人流平均"
        tests:
          - not_null

      - name: black_friday_foot_traffic_avg
        description: "ブラックフライデー人流平均"
        tests:
          - not_null

      - name: gw_decile_rank
        description: "GWデシル区分"
        tests:
          - not_null

      - name: obon_decile_rank
        description: "お盆デシル区分"
        tests:
          - not_null

      - name: three_day_holiday_decile_rank
        description: "三連休デシル区分"
        tests:
          - not_null

      - name: new_year_decile_rank
        description: "正月デシル区分"
        tests:
          - not_null

      - name: regular_weekend_decile_rank
        description: "通常土日デシル区分"
        tests:
          - not_null

      - name: year_end_decile_rank
        description: "年末デシル区分"
        tests:
          - not_null

      - name: bridge_holiday_decile_rank
        description: "飛び石祝日デシル区分"
        tests:
          - not_null

      - name: weekday_decile_rank
        description: "平日デシル区分"
        tests:
          - not_null

      - name: black_friday_decile_rank
        description: "ブラックフライデーデシル区分"
        tests:
          - not_null

  - name: stg_date_master
    description: "日付マスタのstagingモデル"
    columns:
      - name: date
        description: "日付"
        tests:
          - not_null
          - unique

      - name: year_month
        description: "年月"
        tests:
          - not_null

      - name: year
        description: "年度"
        tests:
          - not_null

      - name: month
        description: "月"
        tests:
          - not_null

      - name: day
        description: "日"
        tests:
          - not_null

      - name: week_number_yearly
        description: "週番号（月間_1-52（53））"
        tests:
          - not_null

      - name: week_number_monthly
        description: "週番号（月間_1-4（5））"
        tests:
          - not_null

      - name: weekday_name
        description: "曜日"
        tests:
          - not_null

      - name: weekday_name_and_week_number_monthly
        description: "曜日（週番号）"
        tests:
          - not_null

      - name: weekday_holiday_weekend
        description: "平日/休日（土日のみ）"
        tests:
          - not_null

      - name: is_offday
        description: "休日フラグ"
        tests:
          - not_null

      - name: holiday_name
        description: "祝日名"

      - name: is_holiday
        description: "祝日フラグ"
        tests:
          - not_null

      - name: weekday_holiday_with_holiday
        description: "平日/休日（祝日加味）"
        tests:
          - not_null

      - name: date_type
        description: "日付属性"
        tests:
          - not_null

      - name: date_flag
        description: "日付フラグ"
        tests:
          - not_null

  - name: stg_facility_name_mappings
    description: "施設名マッピングのstagingモデル。施設名の表記ゆれを統一するためのマッピング情報を保持する。"
    columns:
      - name: original_name
        description: "表記ゆれしている施設名"
        tests:
          - not_null

      - name: mapped_name
        description: "表記ゆれ対応後の施設名"
        tests:
          - not_null

  - name: stg_facility_actuals
    description: "施設別・日付別実績のstagingモデル"
    columns:
      - name: source_sheet_name
        description: "元データ（スプレッドシート等）のシート名"
        tests:
          - not_null

      - name: regional_office_name
        description: "地方事務所・地域オフィス名"

      - name: branch_office_name
        description: "支店・支部名"

      - name: facility_name
        description: "施設名"
        tests:
          - not_null

      - name: floor_label
        description: "階数・フロア表記"

      - name: space_name
        description: "スペース・部屋名"

      - name: area_raw
        description: "面積・地域の生データ"

      - name: helper_company_name
        description: "協力会社・ヘルパー会社名"

      - name: staff_count_raw
        description: "スタッフ数の生データ"

      - name: start_date
        description: "開始日"

      - name: end_date
        description: "終了日"

      - name: event_date
        description: "イベント日・発生日"

      - name: actual_value
        description: "実績値（契約数など）"