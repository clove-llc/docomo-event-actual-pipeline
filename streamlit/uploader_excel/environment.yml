# Streamlit in Snowflake で使う conda パッケージ（Snowflake Anaconda チャネル）
# バージョンは requirements.txt と統一。python は SiS 側で解決。
# streamlit はSiSウェアハウスランタイムの「サポート対象バージョン」のみ可（1.51.0/1.50.0/1.49.1）。
# サポート外（例: 1.52.x）を指定すると file_uploader 等が 500 になるため注意。
name: sf_env
channels:
  - snowflake
dependencies:
  - streamlit=1.51.0
  - pandas=2.3.3
  - openpyxl=3.1.5
  - snowflake-snowpark-python=1.51.0
