# Snowflake 移行用 dbt プロジェクト（BigQuery の docomo_event とは分離）。
# RAW_* はアップローダ（streamlit/uploader）が STREAMLIT_UPLODER_XLSX にロードしたものを source として参照する。
name: "docomo_event_sf"
version: "1.0.0"

# profiles.yml の Snowflake 接続（プロファイル名: docomo_event）
profile: "dbt_project"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  docomo_event_sf:
    # 源泉作成: BQ の docomo_event_raw.raw_*（計算済みソース）を Snowflake 上で再現する層。
    # RAW にアップロード済みの生データ（RAW_*）から計算し、BQ raw と同名のテーブルを RAW に作る。
    source_creation:
      +schema: raw       # → HARATO.RAW
      +materialized: table
    staging:
      +schema: stg       # → HARATO.STG
      +materialized: view
    intermediate:
      +schema: int       # → HARATO.INT
      +materialized: table
    marts:
      +schema: mart      # → HARATO.MART
      +materialized: table
    # dynamic_table 検証層: dbt-snowflake の materialized='dynamic_table' を検証する。
    # 既存の INT/MART を汚さないよう専用スキーマ HARATO.DYN に分離する。
    dynamic_table:
      +schema: dyn       # → HARATO.DYN
      +materialized: dynamic_table
      +snowflake_warehouse: STREAMLIT_WH  # dynamic table のリフレッシュに使う WH（必須）
      +target_lag: "1 minutes"
      +refresh_mode: "AUTO"

# seed（dynamic_table 検証の源泉）も専用スキーマ HARATO.DYN に置く。
seeds:
  docomo_event_sf:
    dynamic_table:
      +schema: dyn       # → HARATO.DYN